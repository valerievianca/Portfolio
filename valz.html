<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Valerie's Portfolio</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
}

header{
background:rgb(87,16,16);
padding:20px 30px;
display:flex;
flex-direction:column;
position:relative;
margin-bottom:40px;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
margin:0;
padding:0;
position:absolute;
bottom:20px;
right:20px;
}

nav a{
color:black;
font-weight:bold;
text-decoration:none;
padding:2px 13px;
border-radius:15px;
background-color:rgb(170,166,166);
border:1px solid black;
}

nav a:hover{
background-color:white;
}

.background{
background-image:url("pagod.jpg");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
position:fixed;
height:100%;
width:100%;
filter:blur(13px);
z-index:-1;
}

.myportfolio{
border:2px solid black;
text-align:center;
width:500px;
margin:20px auto;
border-radius:20px;
background-color:rgb(170,166,166);
padding:20px;
font-size:30px;
}

.one, .two{
text-align:center;
margin-bottom:80px;
}

.q1, .q2{
font-size:50px;
color:rgb(87,16,16);
}

.qone img,
.qtwo img{
width:500px;
max-width:90%;
height:auto;
margin-top:50px;
box-shadow:0 0 20px black;
border-radius:20px;
}

footer{
background:rgb(87,16,16);
padding:45px 30px;
display:flex;
flex-direction:column;
align-items:center;
color:antiquewhite;
text-align:center;
margin-top:150px;
}
    
@media (max-width:768px){

header{
padding:15px;
margin-bottom:40px;
}

nav ul{
position:static;
justify-content:center;
margin-top:10px;
flex-wrap:wrap;
}

.myportfolio{
width:90%;
font-size:22px;
}

.q1,.q2{
font-size:32px;
}

.qone img,
.qtwo img{
width:90%;
}

footer{
margin-top:80px;
padding:30px;
}

}

</style>
</head>

<body>

<div class="background"></div>

<header>

<h1 class="myportfolio">My Portfolio</h1>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="quiz.html">Quiz</a></li>
<li><a href="activity.html">Activity</a></li>
</ul>
</nav>

</header>

<section class="one">

<div class="q1"><strong>QUIZ 1</strong></div>

<div class="qone">
<img src="qone.png" alt="Quiz One">
</div>

</section>

<section class="two">

<div class="q2"><strong>QUIZ 2</strong></div>

<div class="qtwo">
<img src="qtwo.png" alt="Quiz Two">
</div>

</section>

<footer>
email: valerieviancabelen@gmail.com<br>
</footer>

</body>
</html>
